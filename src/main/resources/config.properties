# ====================================================================
# PPAC Mobile Automation - default (non-sensitive) configuration.
# Override any value via -Dkey=value, an environment variable, or .env.
# Credentials are NEVER stored here - see .env.example.
# ====================================================================

# Appium server endpoint
appium.server.url=http://127.0.0.1:4723/

# Target platform (currently only: android)
platform.name=android

# Device / emulator
device.name=Pixel7_API33
platform.version=13

# Application under test.
# Either set app.path (an APK to install) OR app.package + app.activity
# (for an app already installed on the device). Leave all blank to configure
# them per-run via .env / -D properties.
app.path=
app.package=
app.activity=

# Session behaviour.
# no.reset=false makes Appium clear app data before each session, so every
# test starts logged out from the welcome screen (test independence).
auto.grant.permissions=true
no.reset=false
full.reset=false
new.command.timeout.seconds=120

# Explicit wait budget in seconds (the framework never uses Thread.sleep)
explicit.wait.seconds=15

# ===================================================================
# Web (Selenium) keys \u2014 merged from selenium-web
# ===================================================================
app.baseUrl=https://ppac-v2-web-uat.prod-verification.compliant101.co.uk/
app.loginHost=ppac-v2-web-uat.prod-verification.compliant101.co.uk
app.dashboardHost=uat-client-dashboard.sandbox-compliant101.co.uk
app.dashboardPath=/workforce-overview
app.loginPath=/login

browser.name=chrome
browser.headless=false
browser.viewport.width=1920
browser.viewport.height=1080

timeout.default=15
timeout.pageLoad=30
timeout.short=5

