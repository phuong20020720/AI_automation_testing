# ====================================================================
# Android capabilities (Appium). Loaded when platform.name=android (default).
# KHONG dat password/token o day - chung thuoc ve .env (xem .env.example).
# Override bat ky key nao qua -Dkey=value, env var, hoac .env.
# ====================================================================

platform.name=android

# --------------------------- Device / emulator -----------------------
device.name=Pixel7_API33
platform.version=13

# --------------------------- App under test --------------------------
# Hoac dat app.path (APK de cai) HOAC app.package + app.activity
# (app da cai san tren may). De trong app.path neu dung package/activity.
app.path=
app.package=com.ppac.app.sandbox
app.activity=com.ppac.app.MainActivity

# --------------------------- Session behaviour -----------------------
# no.reset=false: Appium xoa du lieu app truoc moi session -> moi test bat dau
# tu man Welcome (test independence).
auto.grant.permissions=true
no.reset=false
full.reset=false
new.command.timeout.seconds=120
