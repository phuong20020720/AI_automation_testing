# ====================================================================
# Framework behaviour - moi truong nao cung dung chung.
# KHONG bao gio dat credentials o day - xem .env.example.
# Override bat ky key nao qua -Dkey=value, env var, hoac .env.
# ====================================================================

# --------------------------- Browser (Selenium) ----------------------
browser.name=chrome
browser.headless=false
browser.viewport.width=1920
browser.viewport.height=1080

# --------------------------- Timeouts (seconds) ----------------------
timeout.default=15
timeout.pageLoad=30
timeout.short=5
explicit.wait.seconds=15

# --------------------------- Appium server ---------------------------
appium.server.url=http://127.0.0.1:4723/

# --------------------------- Evidence --------------------------------
# Chup screenshot khi test FAIL (luu artifacts/screenshots/ + dinh kem Allure)
screenshot.on.failure=true
